services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chicken_manure_app
    restart: unless-stopped
    ports:
      - "2022:80"
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: http://localhost:2022
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: chicken_manure
      DB_USERNAME: itadmin
      DB_PASSWORD: Noipalee@09
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
    depends_on:
      - db

  db:
    image: mariadb:10.11
    container_name: chicken_manure_db
    restart: unless-stopped
    ports:
      - "3312:3306"
    environment:
      MYSQL_DATABASE: chicken_manure
      MYSQL_USER: itadmin
      MYSQL_PASSWORD: Noipalee@09
      MYSQL_ROOT_PASSWORD: Noipalee@09
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
